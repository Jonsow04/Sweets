<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweet Dreams</title>
    <!-- bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/estilo_inicio.css">
    <script src="js/inicio.js" defer></script>


    <body>
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>

        <div class="wrapper">
            <!-- lado izquierdo de la card de inicio -->
            <div class="panel-left">
                <div>
                    <div class="brand-name">Sweet Dreams</div>
                    <p class="tagline">Sistema de ventas</p>
                </div>

            </div>

            <!-- lado derecho-->
            <div class="panel-right">
                <h2 class="form-title">Bienvenido!! 👋</h2>
                <p class="form-sub">Ingrese los datos del usuario</p>

                <!-- formulario -->
                <div class="field">
                    <label for="usuario">Usuario</label>
                    <input type="text" id="usuario" value="Admin" placeholder="Usuario">
                </div>

                <div class="field">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••">
                </div>

                <button class="btn-login" onclick="login()">ENTRAR AL SISTEMA</button>

                <p class="login-note">
                    Pueden ingresar con cualquier contraseña para este borrador c:
                </p>
            </div>
        </div>

    </body>

</html>
