<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweet Dreams - Acceso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/estilo_inicio.css">

</head>

<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="wrapper">
        <div class="panel-left">
            <div>
                <div class="brand-name">🍬 Sweet Dreams</div>
                <p class="tagline">Sistema de punto de venta</p>
                <div class="mt-4" style="font-size:0.85rem;opacity:0.8">
                    <p class="mb-1">👑 Admin — acceso completo al punto de venta</p>
                    <p class="mb-1">💼 Cajero — solo ventas e historial de venta</p>
                </div>
            </div>
        </div>
        <div class="panel-right">
            <h2 class="form-title">Bienvenido!! 👋</h2>
            <p class="form-sub">Ingresa tu correo y contraseña</p>

            <div id="errorMsg" class="alert alert-danger d-none"></div>

            <div class="field">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" placeholder="usuario@sweets.com" onkeydown="if(event.key==='Enter') login()">
            </div>
            <div class="field">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" onkeydown="if(event.key==='Enter') login()">
            </div>

            <div class="chips mb-3">
                <span class="chip active" onclick="setUsuario('admin@sweets.com', this)">👑 Admin</span>
                <span class="chip" onclick="setUsuario('lara@sweets.com', this)">💼 Cajero</span>
            </div>

            <button class="btn-login" onclick="login()" id="btnLogin">Entrar →</button>

            <p class="mt-3 text-muted" style="font-size:0.78rem;line-height:1.8">
                Admin: <strong>admin@sweets.com</strong> / <strong>admin123</strong><br> Cajero: <strong>lara@sweets.com</strong> / <strong>cajero123</strong>
            </p>
        </div>
    </div>

    <script src="js/inicio.js"></script>
</body>

</html>
