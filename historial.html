<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial - Sweet Dreams</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/estilo_historial.css">
</head>

<body>
    <nav class="navbar navbar-light bg-white shadow-sm mb-4">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" style="color:#e91e8c">🍬 Sweet Dreams</a>
            <div class="d-flex align-items-center gap-3">
                <span class="badge text-white" id="badgeRol" style="background:#607d8b"></span>
                <span class="text-muted small">👤 <span id="userTag"></span></span>
                <a href="punto_venta.html" class="btn btn-outline-secondary btn-sm">← Volver al POS</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h3 id="tituloHistorial">🕒 Historial de Ventas</h3>
                <small class="text-muted" id="subtituloHistorial"></small>
            </div>
            <div id="filtroAdmin" class="d-none">
                <input type="date" id="filtroFecha" class="form-control form-control-sm" style="width:auto" onchange="renderHistorial()">
            </div>
        </div>

        <div id="statsRow" class="row g-3 mb-4"></div>
        <div id="contenedorHistorial" class="list-group"></div>
    </div>

    <script src="js/funciones_historial.js"></script>

</html>
