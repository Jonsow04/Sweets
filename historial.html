<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Historial - Sweet Dreams</title>

    <link rel="stylesheet" href="css/estilo_historial.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <nav class="navbar navbar-light bg-white shadow-sm mb-4">
        <div class="container-fluid">

            <a class="navbar-brand fw-bold" style="color:#e91e8c">
                🍬 Sweet Dreams
            </a>

            <div>
                <span class="text-muted me-3">
                    👤 <span id="userTag"></span>
                </span>

                <a href="punto_venta.html" class="btn btn-outline-secondary btn-sm">
                    ← Volver al POS
                </a>
            </div>
        </div>
    </nav>

    <div class="container">

        <div class="d-flex justify-content-between align-items-center mb-4">

            <h3>🕒 Historial de Ventas</h3>

            <input type="date" id="filtroFecha" class="form-control form-control-sm" style="width:auto" onchange="renderHistorial()">
        </div>

        <div id="statsRow" class="row g-3 mb-4"></div>

        <div id="contenedorHistorial" class="list-group"></div>

    </div>

    <script>
        let todasLasVentas = [];

        document.addEventListener('DOMContentLoaded', async() => {

            document.getElementById('userTag').textContent =
                sessionStorage.getItem('cajeroActual') || 'Admin';

            const resp = await fetch('/api/ventas');

            todasLasVentas = await resp.json();

            renderHistorial();
        });

        function formatearFecha(fecha) {

            if (!fecha) return '—';

            // Si viene como 2026-05-18
            if (fecha.includes('-')) {
                return fecha.split('T')[0].split('-').reverse().join('/');
            }

            return fecha;
        }

        function renderHistorial() {

            const filtro = document.getElementById('filtroFecha').value;

            const ventas = filtro ?
                todasLasVentas.filter(v =>
                    v.fecha &&
                    v.fecha.startsWith(filtro)
                ) :
                todasLasVentas;

            const total = ventas.reduce(
                (a, v) => a + Number(v.total),
                0
            );

            document.getElementById('statsRow').innerHTML = `

                <div class="col-md-4">

                    <div class="card text-center shadow-sm border-0"
                        style="background:#fce4ec">

                        <div class="card-body">

                            <h4 class="fw-bold"
                                style="color:#e91e8c">
                                ${ventas.length}
                            </h4>

                            <small class="text-muted">
                                Ventas
                            </small>

                        </div>
                    </div>
                </div>

                <div class="col-md-4">

                    <div class="card text-center shadow-sm border-0"
                        style="background:#f3e5f5">

                        <div class="card-body">

                            <h4 class="fw-bold"
                                style="color:#e91e8c">
                                $${total.toFixed(2)}
                            </h4>

                            <small class="text-muted">
                                Total
                            </small>

                        </div>
                    </div>
                </div>

                <div class="col-md-4">

                    <div class="card text-center shadow-sm border-0"
                        style="background:#e8f5e9">

                        <div class="card-body">

                            <h4 class="fw-bold text-success">

                                $${ventas.length
                                    ? (total / ventas.length).toFixed(2)
                                    : '0.00'}

                            </h4>

                            <small class="text-muted">
                                Promedio
                            </small>

                        </div>
                    </div>
                </div>
            `;

            if (!ventas.length) {

                document.getElementById('contenedorHistorial').innerHTML = `
                    <p class="text-muted text-center p-4">
                        No hay ventas.
                    </p>
                `;

                return;
            }

            document.getElementById('contenedorHistorial').innerHTML =
                ventas.map(v => `

                <div class="list-group-item mb-3 shadow-sm border-start border-danger border-4 rounded">

                    <div class="d-flex justify-content-between align-items-center">

                        <div>

                            <h6 class="mb-1 fw-bold">
                                Venta #${v.idVenta}
                            </h6>

                            <small class="text-muted">
                                ${formatearFecha(v.fecha)}
                            </small>

                        </div>

                        <div class="text-end">

                            <span class="badge bg-success fs-6">
                                $${Number(v.total).toFixed(2)}
                            </span>

                            <br>

                            <small class="text-muted">
                                Atendió: ${v.empleado_nombre || 'Admin'}
                            </small>

                        </div>
                    </div>

                    <hr class="my-2">

                    <small class="text-secondary">

                        <strong>Detalle:</strong>

                        ${
                            v.items && v.items.length
                            ? v.items.map(i =>
                                `${i.cantidad}x ${i.dulce_nombre}`
                              ).join(', ')
                            : '—'
                        }

                    </small>

                </div>

            `).join('');
        }
    </script>

</body>

</html>
