<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweet Dreams - POS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/estilo_puntoventa.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/funciones_puntoventa.js" defer></script>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-pos">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#">🍬 SWEET DREAMS</a>
            <div class="collapse navbar-collapse">
                <form class="d-flex mx-auto" onsubmit="return false;">
                    <input class="form-control search-nav" type="search" id="navSearch" placeholder="🔍 Buscar producto..." onkeyup="filtrarInventario()">
                </form>
                <div class="navbar-nav">
                    <button class="btn nav-btn" onclick="window.location.href='historial.html'">🕒 Historial</button>
                    <button class="btn nav-btn" onclick="window.location.href='mas_vendido.html'">⭐ Más Vendidos</button>
                    <button class="btn nav-btn" onclick="window.location.href='productos.html'">📦 Inventario</button>
                    <div class="dropdown ms-2">
                        <button class="btn nav-btn dropdown-toggle" data-bs-toggle="dropdown">
                            👤 <span id="userTag">Admin</span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item text-danger" href="#" onclick="cerrarSesion()">🚪 Cerrar sesión</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="app-container">
        <div class="sidebar-left">
            <div class="p-2 border-bottom">
                <strong style="color:var(--accent)">📋 Catálogo</strong>
            </div>
            <div class="product-list" id="listaRapida">
                <p class="text-center text-muted p-3">Cargando...</p>
            </div>
        </div>

        <div class="main-content">
            <div class="d-flex justify-content-between align-items-center p-3 border-bottom">
                <h6 class="mb-0 fw-bold">🛒 Venta Actual</h6>
                <button class="btn btn-sm btn-outline-danger" onclick="limpiarCarrito()">🗑 Vaciar</button>
            </div>
            <div class="table-responsive">
                <table class="table table-sm" id="tablaVentas">
                    <thead class="table-light">
                        <tr>
                            <th>Producto</th>
                            <th class="text-center">Cant.</th>
                            <th class="text-end">Precio</th>
                            <th class="text-end">Subtotal</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
            <div id="carritoVacio" class="text-center text-muted p-5">
                <p>Selecciona productos del catálogo</p>
            </div>
        </div>

        <div class="sidebar-right">
            <div class="p-3">
                <div class="total-box mb-3">
                    <span class="text-muted">Total</span>
                    <span class="total-amount" id="totalDisplay">$0.00</span>
                </div>
                <div class="mb-3">
                    <label class="form-label small text-muted">Pago recibido</label>
                    <input type="number" class="form-control" id="inputPago" placeholder="$0.00" min="0" step="0.01" oninput="calcularCambio()">
                </div>
                <div class="cambio-box mb-3" id="cambioBox" style="display:none">
                    <span class="text-muted">Cambio</span>
                    <span class="fw-bold text-success" id="cambioDisplay">$0.00</span>
                </div>
                <button class="btn btn-cobrar w-100 mb-2" onclick="cobrar()">💳 COBRAR</button>
                <button class="btn btn-outline-secondary w-100 btn-sm" onclick="hacerCorte()">📊 Corte de Caja</button>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalTicket" tabindex="-1">
        <div class="modal-dialog modal-sm">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">🧾 Ticket</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="ticketContenido"></div>
                <div class="modal-footer">
                    <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cerrar</button>
                    <button class="btn btn-primary btn-sm" onclick="window.print()">🖨 Imprimir</button>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
