<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Más Vendidos - Sweet Dreams</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#f8f9fa">
    <nav class="navbar navbar-light bg-white shadow-sm mb-4">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" style="color:#e91e8c">🍬 Sweet Dreams</a>
            <a href="punto_venta.html" class="btn btn-outline-secondary btn-sm">← Volver al POS</a>
        </div>
    </nav>
    <div class="container">
        <div class="col-md-8 mx-auto">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white">
                    <h5 class="mb-0" style="color:#c2185b">⭐ Productos Más Vendidos</h5>
                </div>
                <div class="card-body" id="contenedorRanking">
                    <p class="text-center text-muted">Cargando...</p>
                </div>
            </div>
        </div>
    </div>
    <script>
        async function generarRanking() {
            const contenedor = document.getElementById('contenedorRanking');
            try {
                const resp = await fetch('/api/masvendidos');
                const prods = await resp.json();
                const conVentas = prods.filter(p => p.ventas > 0);
                if (!conVentas.length) {
                    contenedor.innerHTML = '<div class="text-center p-5"><h1>🍭</h1><p class="text-muted">Aún no hay ventas.</p></div>';
                    return;
                }
                const max = conVentas[0].ventas;
                contenedor.innerHTML = prods.map((p, i) => {
                    const pct = max > 0 ? (p.ventas / max) * 100 : 0;
                    const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '🍬';
                    const color = i === 0 ? '#e91e8c' : i === 1 ? '#9c27b0' : i === 2 ? '#f44336' : '#90a4ae';
                    return `
                        <div class="mb-4">
                            <div class="d-flex justify-content-between align-items-center mb-1">
                                <span class="fw-bold">${medal} ${p.nombre}</span>
                                <span class="badge rounded-pill text-white" style="background:${color}">${p.ventas} uds</span>
                            </div>
                            <div class="progress" style="height:22px;border-radius:12px">
                                <div class="progress-bar" style="width:${pct}%;background:${color};border-radius:12px">
                                    ${p.ventas > 0 ? '$' + Number(p.precio).toFixed(2) : ''}
                                </div>
                            </div>
                        </div>`;
                }).join('');
            } catch (err) {
                contenedor.innerHTML = '<p class="text-danger text-center">Error al cargar</p>';
            }
        }
        generarRanking();
    </script>
</body>

</html>
