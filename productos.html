<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario - Sweet Dreams</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/estilo_productos.css">
</head>

<body>
    <nav class="navbar navbar-light bg-light mb-4 shadow-sm">
        <div class="container d-flex justify-content-between">
            <span class="navbar-brand fw-bold navbar-brand-inventario">📦 GESTIÓN DE INVENTARIO</span>
            <div>
                <button class="btn btn-success btn-sm" onclick="abrirCreador()">+ Nuevo Producto</button>
                <a href="punto_venta.html" class="btn btn-outline-secondary btn-sm">← Volver al punto de venta</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="card shadow-sm">
            <div class="card-header bg-white d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Lista de Productos Actuales</h5>
                <input type="text" class="form-control form-control-sm w-auto" placeholder="🔍 Buscar..." oninput="filtrarProductos(this.value)">
            </div>
            <div class="card-body p-0">
                <div id="listaProductos" class="p-3">
                    <p class="text-center text-muted">Cargando inventario...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL -->
    <div class="modal fade" id="modalProducto" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="tituloModal">Nuevo Producto</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editId">

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Nombre</label>
                        <input type="text" class="form-control" id="editNombre" maxlength="30" placeholder="Nombre del producto">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Precio ($)</label>
                        <input type="number" class="form-control" id="editPrecio" min="0" step="0.01" placeholder="0.00">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Stock</label>
                        <input type="number" class="form-control" id="editStock" min="0" placeholder="0">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Tipo de dulce</label>
                        <select class="form-select" id="editTipo">
                            <option value="">Cargando...</option>
                        </select>
                    </div>

                    <div id="modalError" class="alert alert-danger d-none"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" id="btnGuardar">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS primero, luego el script de la página -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/funciones_productos.js"></script>
</body>

</html>
