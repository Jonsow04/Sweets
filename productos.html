<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/estilo_productos.css">
    <script src="js/funciones_productos.js"></script>
    <title>Inventario - Sweet Dreams</title>
</head>

<body onload="listarProductosEdicion()">
    <nav class="navbar navbar-light bg-light mb-4 shadow-sm">
        <div class="container d-flex justify-content-
        
        
        between">
            <span class="navbar-brand fw-bold navbar-brand-inventario">📦 GESTIÓN DE INVENTARIO</span>
            <div>
                <button class="btn btn-success btn-sm" onclick="abrirCreador()">+ Nuevo Producto</button>
                <a href="punto_venta.html" class="btn btn-outline-secondary btn-sm">Volver al punto de venta</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="card shadow-sm">
            <div class="card-header bg-white">
                <h5 class="mb-0">Lista de Productos Actuales</h5>
            </div>
            <div class="card-body">
                <div id="listaProductos">
                    <p class="text-center text-muted">Cargando inventario...</p>
                </div>
            </div>
        </div>
    </div>

    <div id="modalProducto">
        <h4 id="tituloModal" class="fw-bold mb-3">Producto</h4>

        <div class="mb-3">
            <label class="small fw-bold">Código (ID)</label>
            <input type="text" id="inputId" class="form-control" placeholder="Ej: 006">
        </div>

        <div class="mb-3">
            <label class="small fw-bold">Nombre del Dulce</label>
            <input type="text" id="inputNom" class="form-control" placeholder="Ej: Gomitas">
        </div>

        <div class="mb-3">
            <label class="small fw-bold">Precio ($)</label>
            <input type="number" id="inputPre" class="form-control" placeholder="Ej: 15" step="0.01">
        </div>

        <div class="d-grid gap-2">
            <button class="btn btn-primary" onclick="procesarProducto()">Guardar Producto</button>
            <button class="btn btn-light" onclick="cerrarModal()">Cancelar</button>
        </div>
    </div>

    <div id="overlay" onclick="cerrarModal()"></div>

</body>

</html>
