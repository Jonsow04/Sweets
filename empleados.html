<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empleados - Sweet Dreams</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/estilo_productos.css">
</head>

<body>
    <nav class="navbar navbar-light bg-light mb-4 shadow-sm">
        <div class="container d-flex justify-content-between">
            <span class="navbar-brand fw-bold navbar-brand-inventario">👥 GESTIÓN DE EMPLEADOS</span>
            <div>
                <button class="btn btn-success btn-sm" onclick="abrirCreador()">+ Nuevo Empleado</button>
                <a href="punto_venta.html" class="btn btn-outline-secondary btn-sm ms-2">← Volver al POS</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- Solo accesible para admin -->
        <div id="accesoNegado" class="d-none">
            <div class="alert alert-danger text-center">
                <h4>🚫 Acceso denegado</h4>
                <p>Esta sección es solo para administradores.</p>
                <a href="punto_venta.html" class="btn btn-primary">Volver al POS</a>
            </div>
        </div>

        <div id="contenidoAdmin">
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <h5 class="mb-0">Lista de Empleados</h5>
                </div>
                <div class="card-body p-0">
                    <div id="listaEmpleados" class="p-3">
                        <p class="text-center text-muted">Cargando...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL CREAR / EDITAR -->
    <div class="modal fade" id="modalEmpleado" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="tituloModal">Nuevo Empleado</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editId">
                    <div class="row g-3">
                        <div class="col-6">
                            <label class="form-label fw-semibold">Nombre</label>
                            <input type="text" class="form-control" id="editNombre" maxlength="30">
                        </div>
                        <div class="col-6">
                            <label class="form-label fw-semibold">Apellido Paterno</label>
                            <input type="text" class="form-control" id="editApPat" maxlength="20">
                        </div>
                        <div class="col-6">
                            <label class="form-label fw-semibold">Apellido Materno</label>
                            <input type="text" class="form-control" id="editApMat" maxlength="20">
                        </div>
                        <div class="col-6">
                            <label class="form-label fw-semibold">Correo electrónico</label>
                            <input type="email" class="form-control" id="editEmail" maxlength="50">
                        </div>
                        <div class="col-6">
                            <label class="form-label fw-semibold">
                                Contraseña
                                <small class="text-muted fw-normal">(vacío = no cambiar)</small>
                            </label>
                            <input type="password" class="form-control" id="editPassword" placeholder="Nueva contraseña">
                        </div>
                        <div class="col-6">
                            <label class="form-label fw-semibold">Rol</label>
                            <select class="form-select" id="editRol">
                                <option value="cajero">💼 Cajero</option>
                                <option value="admin">👑 Administrador</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">Puesto</label>
                            <select class="form-select" id="editPuesto"></select>
                        </div>
                    </div>
                    <div id="modalError" class="alert alert-danger d-none mt-3"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" id="btnGuardar">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const ROL = sessionStorage.getItem('cajeroRol') || 'cajero';
        let todosLosEmpleados = [];
        let modalBS;

        document.addEventListener('DOMContentLoaded', () => {
            // Verificar acceso
            if (ROL !== 'admin') {
                document.getElementById('accesoNegado').classList.remove('d-none');
                document.getElementById('contenidoAdmin').classList.add('d-none');
                return;
            }

            modalBS = new bootstrap.Modal(document.getElementById('modalEmpleado'), {
                backdrop: 'static'
            });
            document.getElementById('btnGuardar').addEventListener('click', guardarEmpleado);

            listarEmpleados();
            cargarPuestos();
        });

        function getHeaders() {
            return {
                'Content-Type': 'application/json',
                'x-user-rol': ROL
            };
        }

        async function listarEmpleados() {
            try {
                const resp = await fetch('/api/empleados', {
                    headers: getHeaders()
                });
                todosLosEmpleados = await resp.json();
                renderEmpleados();
            } catch (err) {
                document.getElementById('listaEmpleados').innerHTML =
                    '<p class="text-danger text-center">Error al cargar empleados</p>';
            }
        }

        function renderEmpleados() {
            const contenedor = document.getElementById('listaEmpleados');
            if (!todosLosEmpleados.length) {
                contenedor.innerHTML = '<p class="text-muted text-center">No hay empleados registrados.</p>';
                return;
            }
            contenedor.innerHTML = todosLosEmpleados.map(e => `
                <div class="d-flex justify-content-between align-items-center border p-3 mb-2 bg-white rounded shadow-sm">
                    <div>
                        <strong>${e.nombre} ${e.apPat} ${e.apMat || ''}</strong>
                        <span class="badge ms-2 ${e.rol === 'admin' ? 'bg-danger' : 'bg-secondary'}">
                            ${e.rol === 'admin' ? '👑 Admin' : ' 💼 Cajero'}
                        </span><br>
                        <small class="text-muted">📧 ${e.email}</small>
                        <span class="text-muted ms-3">💼 ${e.nombrePuesto}</span>
                        <span class="text-success ms-3">💰 $${Number(e.salario).toFixed(2)}</span>
                    </div>
                    <div class="d-flex gap-2">
                        <button class="btn btn-sm btn-outline-primary" onclick="abrirEditor(${e.idEmpleado})">
                            ✏️ Editar
                        </button>
                        ${e.idEmpleado !== 1 ? `
                        <button class="btn btn-sm btn-outline-danger" onclick="eliminarEmpleado(${e.idEmpleado}, '${e.nombre}')">
                            🗑
                        </button>` : '<span class="btn btn-sm btn-outline-secondary disabled">🔒</span>'}
                    </div>
                </div>
            `).join('');
        }

        async function cargarPuestos() {
            const resp = await fetch('/api/puestos');
            const puestos = await resp.json();
            document.getElementById('editPuesto').innerHTML = puestos.map(p =>
                `<option value="${p.idPuestoEmpleado}">${p.nombrePuesto} — $${Number(p.salario).toFixed(2)}</option>`
            ).join('');
        }

        function abrirCreador() {
            document.getElementById('tituloModal').textContent = 'Nuevo Empleado';
            document.getElementById('editId').value = '';
            document.getElementById('editNombre').value = '';
            document.getElementById('editApPat').value = '';
            document.getElementById('editApMat').value = '';
            document.getElementById('editEmail').value = '';
            document.getElementById('editPassword').value = '';
            document.getElementById('editRol').value = 'cajero';
            document.getElementById('modalError').classList.add('d-none');
            modalBS.show();
        }

        function abrirEditor(id) {
            const emp = todosLosEmpleados.find(e => e.idEmpleado === id);
            if (!emp) return;
            document.getElementById('tituloModal').textContent = 'Editar Empleado';
            document.getElementById('editId').value = emp.idEmpleado;
            document.getElementById('editNombre').value = emp.nombre;
            document.getElementById('editApPat').value = emp.apPat;
            document.getElementById('editApMat').value = emp.apMat || '';
            document.getElementById('editEmail').value = emp.email;
            document.getElementById('editPassword').value = '';
            document.getElementById('editRol').value = emp.rol;
            document.getElementById('editPuesto').value = emp.idPuestoEmpleado;
            document.getElementById('modalError').classList.add('d-none');
            modalBS.show();
        }

        async function guardarEmpleado() {
            const id             = document.getElementById('editId').value;
            const nombre         = document.getElementById('editNombre').value.trim();
            const apPat          = document.getElementById('editApPat').value.trim();
            const apMat          = document.getElementById('editApMat').value.trim();
            const email          = document.getElementById('editEmail').value.trim();
            const password       = document.getElementById('editPassword').value.trim();
            const rol            = document.getElementById('editRol').value;
            const idPuestoEmpleado = parseInt(document.getElementById('editPuesto').value);
            const errDiv         = document.getElementById('modalError');
            const btn            = document.getElementById('btnGuardar');

            if (!nombre || !apPat || !email || !rol) {
                errDiv.textContent = 'Nombre, apellido, email y rol son obligatorios';
                errDiv.classList.remove('d-none');
                return;
            }
            if (!id && !password) {
                errDiv.textContent = 'La contraseña es obligatoria para nuevos empleados';
                errDiv.classList.remove('d-none');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Guardando...';

            const url    = id ? `/api/empleados/${id}` : '/api/empleados';
            const method = id ? 'PUT' : 'POST';

            try {
                const resp = await fetch(url, {
                    method,
                    headers: getHeaders(),
                    body: JSON.stringify({ nombre, apPat, apMat, email, password, rol, idPuestoEmpleado })
                });
                if (!resp.ok) {
                    const err = await resp.json();
                    throw new Error(err.error || 'Error al guardar');
                }
                modalBS.hide();
                await listarEmpleados();
            } catch (err) {
                errDiv.textContent = err.message;
                errDiv.classList.remove('d-none');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Guardar';
            }
        }

        async function eliminarEmpleado(id, nombre) {
            if (!confirm(`¿Eliminar a "${nombre}"? Esta acción no se puede deshacer.`)) return;
            try {
                const resp = await fetch(`/api/empleados/${id}`, {
                    method: 'DELETE',
                    headers: getHeaders()
                });
                if (!resp.ok) {
                    const err = await resp.json();
                    throw new Error(err.error);
                }
                await listarEmpleados();
            } catch (err) {
                alert('❌ Error: ' + err.message);
            }
        }
    </script>
</body>

</html>
